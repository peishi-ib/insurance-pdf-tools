<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM 助手 | PDF 智能合併工作站</title>
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <style>
        /* 沿用您喜愛的雙欄酷炫風格 */
        body { 
            font-family: 'PingFang TC', 'Heiti TC', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; color: #1e293b; padding: 20px; box-sizing: border-box;
        }

        .workstation {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%; max-width: 950px; display: flex; flex-direction: row;
            overflow: hidden; border: 1px solid #fff;
        }

        .left-panel { flex: 1.2; padding: 40px; border-right: 1px solid #e2e8f0; }
        .right-panel { flex: 1; padding: 40px; background: #f8fafc; display: flex; flex-direction: column; }

        h2 { margin: 0 0 5px 0; color: #0f172a; font-weight: 800; }
        .subheader { color: #64748b; font-size: 13px; margin-bottom: 30px; letter-spacing: 1px; }

        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; font-size: 14px; color: #334155; }

        input[type="text"] { 
            width: 100%; padding: 14px; border: 2px solid #cbd5e1; border-radius: 10px; 
            box-sizing: border-box; font-size: 15px; transition: all 0.2s; background-color: #f1f5f9;
        }
        input[type="text"]:focus { outline: none; border-color: #3b82f6; background-color: #fff; }

        .drop-zone {
            border: 2px dashed #94a3b8; border-radius: 12px; padding: 40px 20px;
            text-align: center; background-color: #f8fafc; cursor: pointer;
            transition: all 0.2s; color: #475569;
        }
        .drop-zone:hover { background-color: #f1f5f9; border-color: #64748b; }
        .drop-zone.dragover { background-color: #dbeafe; border-color: #3b82f6; transform: scale(1.02); }
        .drop-zone-icon { font-size: 40px; display: block; margin-bottom: 10px; }

        button { 
            width: 100%; padding: 18px; background-color: #0f172a; color: white;
            border: none; border-radius: 10px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: all 0.2s;
        }
        button:hover { background-color: #334155; transform: translateY(-2px); }
        button:disabled { background-color: #cbd5e1; cursor: not-allowed; transform: none; }

        .file-list {
            flex-grow: 1; overflow-y: auto; max-height: 450px;
            border: 1px solid #e2e8f0; border-radius: 10px; background: #fff; padding: 10px;
        }
        .file-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 13px;
        }
        .file-name { color: #475569; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%; }
        
        #globalStatus { margin-top: 15px; font-size: 14px; text-align: center; font-weight: bold; color: #2563eb; }
    </style>
</head>
<body>

<div class="workstation">
    <div class="left-panel">
        <h2>PDF 智能合併工作站</h2>
        <div class="subheader">專為 NotebookLM 大量資料整理設計</div>
        
        <div class="form-group">
            <label>1. 拖曳或選取多個 PDF：</label>
            <div id="dropZone" class="drop-zone">
                <span class="drop-zone-icon">📂</span>
                <div class="drop-zone-text">將多個 PDF 檔案拖曳至此<br>或點擊選取</div>
                <input type="file" id="pdfFiles" accept=".pdf" multiple style="display: none;">
            </div>
        </div>

        <div class="form-group">
            <label>2. 設定合併後的檔名：</label>
            <input type="text" id="outputFileName" placeholder="請輸入檔名">
        </div>

        <button id="processBtn">選擇存檔路徑並合併</button>
        <div id="globalStatus"></div>
    </div>

    <div class="right-panel">
        <div style="font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between;">
            <span>待合併清單</span>
            <span id="fileCountBadge" style="font-size: 12px; color: #64748b;">0 個檔案</span>
        </div>
        <div id="fileList" class="file-list">
            <div style="text-align: center; color: #94a3b8; margin-top: 50px; font-size: 13px;">尚未匯入檔案...</div>
        </div>
    </div>
</div>

<script>
    const { PDFDocument } = PDFLib;
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('pdfFiles');
    const fileListDiv = document.getElementById('fileList');
    const fileNameInput = document.getElementById('outputFileName');
    const globalStatus = document.getElementById('globalStatus');
    const btn = document.getElementById('processBtn');

    let currentFiles = [];

    // 自動生成預設檔名：日期_時間_合併文件
    function generateDefaultName() {
        const now = new Date();
        const dateStr = now.getFullYear() + 
                      String(now.getMonth() + 1).padStart(2, '0') + 
                      String(now.getDate()).padStart(2, '0');
        const timeStr = String(now.getHours()).padStart(2, '0') + 
                      String(now.getMinutes()).padStart(2, '0');
        return `${dateStr}_${timeStr}_合併文件.pdf`;
    }
    fileNameInput.value = generateDefaultName();

    // 檔案拖曳處理
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault(); dropZone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
    });

    function handleFiles(files) {
        const newFiles = Array.from(files).filter(f => f.name.toLowerCase().endsWith('.pdf'));
        currentFiles = [...currentFiles, ...newFiles];
        updateUI();
    }

    function updateUI() {
        document.getElementById('fileCountBadge').innerText = `${currentFiles.length} 個檔案`;
        fileListDiv.innerHTML = '';
        currentFiles.forEach((file, index) => {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `<span class="file-name">${index + 1}. ${file.name}</span>`;
            fileListDiv.appendChild(item);
        });
    }

    // 核心合併與資料夾儲存邏輯
    btn.addEventListener('click', async () => {
        if (currentFiles.length === 0) return alert('請先上傳 PDF 檔案！');
        
        let finalName = fileNameInput.value.trim();
        if (!finalName.endsWith('.pdf')) finalName += '.pdf';

        try {
            // 1. 請求資料夾權限 (這會彈出視窗請您選擇存檔位置)
            const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
            
            btn.disabled = true;
            globalStatus.innerText = '正在合併並寫入檔案，請稍候...';

            // 2. 執行合併
            const mergedPdf = await PDFDocument.create();
            for (const file of currentFiles) {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await PDFDocument.load(arrayBuffer);
                const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                pages.forEach(page => mergedPdf.addPage(page));
            }

            const pdfBytes = await mergedPdf.save();

            // 3. 在指定資料夾建立檔案
            const fileHandle = await dirHandle.getFileHandle(finalName, { create: true });
            const writable = await fileHandle.createWritable();
            await writable.write(pdfBytes);
            await writable.close();

            globalStatus.style.color = '#16a34a';
            globalStatus.innerText = `✅ 合併成功！已存至您指定的資料夾。`;
            btn.disabled = false;
            
        } catch (err) {
            console.error(err);
            if (err.name !== 'AbortError') {
                alert('處理失敗：' + err.message);
            }
            globalStatus.innerText = '';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
