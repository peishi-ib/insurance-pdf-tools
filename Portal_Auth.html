<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f4f7f6; /* 溫潤淺灰 */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .auth-card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .crown-icon {
      font-size: 50px;
      margin-bottom: 10px;
    }
    h2 {
      color: #2c3e50;
      margin-bottom: 5px;
    }
    p {
      color: #7f8c8d;
      font-size: 14px;
      margin-bottom: 25px;
    }
    input {
      width: 100%;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 18px;
      text-align: center;
      margin-bottom: 20px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.3s;
    }
    input:focus {
      border-color: #8BC220; /* 公勝綠 */
    }
    button {
      background-color: #8BC220; /* 公勝綠 */
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 50px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 15px rgba(139, 194, 32, 0.3);
      transition: transform 0.2s, background-color 0.2s;
    }
    button:hover {
      background-color: #7ab01c;
      transform: translateY(-2px);
    }
    .footer-text {
      margin-top: 25px;
      font-size: 11px;
      color: #bdc3c7;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="crown-icon">👑</div>
    <h2>皇家私密評估報告</h2>
    <p>為保護客戶資安，請輸入您的生日解鎖內容<br>(格式例：19900217)</p>
    
    <input type="tel" id="birthInput" maxlength="8" placeholder="請輸入 8 位數生日" autofocus>
    
    <button onclick="unlock()">🚀 立即解鎖報告</button>
    
    <div class="footer-text">
      服務人員：吳佩璽保險經紀人<br>
      © 2026 皇家旗艦保險客情系統
    </div>
  </div>

  <script>
    function unlock() {
      const birth = document.getElementById('birthInput').value;
      if (birth.length !== 8) {
        alert("請輸入完整的 8 位數生日。");
        return;
      }
      
      const btn = document.querySelector('button');
      btn.disabled = true;
      btn.innerHTML = "解析中...";
      
      // 呼叫伺服器端驗證
      google.script.run
        .withSuccessHandler(function(res) {
          if (res.success) {
            // 跳轉至主報告頁 (帶上 admin token 或重新載入頁面)
            window.location.href = window.location.href + "&page=main&pwd=" + birth;
          } else {
            alert(res.msg);
            btn.disabled = false;
            btn.innerHTML = "🚀 立即解鎖報告";
          }
        })
        .verifyBirthday("<?= clientId ?>", "<?= type ?>", birth);
    }

    // 支援 Enter 鍵
    document.getElementById('birthInput').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') unlock();
    });
  </script>
</body>
</html>
