<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>佩璽保險自動化 | 旗艦門戶</title>
    <style>
        :root {
            --primary: #2DB7F5;
            --secondary: #8BC220;
            --dark: #1e293b;
            --bg: #0f172a;
        }
        body {
            margin: 0;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: var(--bg);
            display: flex;
            height: 100vh;
            color: white;
            overflow: hidden;
        }
        /* 側邊欄 */
        .sidebar {
            width: 260px;
            background: #1e293b;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .logo-area {
            padding: 30px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(to right, #1e293b, #334155);
        }
        .logo-icon {
            width: 35px;
            height: 35px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(45, 183, 245, 0.4);
        }
        .nav-list {
            flex: 1;
            padding: 20px 0;
        }
        .nav-item {
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            color: #94a3b8;
            font-size: 14px;
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.05);
            color: white;
        }
        .nav-item.active {
            background: var(--primary);
            color: white;
            box-shadow: inset 4px 0 0 white;
        }
        /* 主區域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8fafc;
        }
        iframe {
            flex: 1;
            border: none;
            width: 100%;
        }
        /* 登入遮罩 */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.5s;
        }
        .login-box {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 320px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            text-align: center;
            font-size: 18px;
            letter-spacing: 5px;
        }
        button.login-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        /* 手機適配 */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: -260px;
                height: 100%;
                z-index: 1000;
            }
            .sidebar.open { left: 0; }
            .mobile-header {
                display: flex;
                background: var(--dark);
                padding: 15px;
                justify-content: space-between;
                align-items: center;
            }
        }
        @media (min-width: 769px) { .mobile-header { display: none; } }
    </style>
</head>
<body>

    <!-- 登入遮罩 -->
    <div id="login-overlay">
        <div class="login-box">
            <div class="logo-icon" style="margin: 0 auto 20px;">P</div>
            <h2 style="margin: 0;">佩璽保險自動化</h2>
            <p style="color: #94a3b8; font-size: 13px;">請輸入皇家授權代碼</p>
            <input type="password" id="login-pwd" placeholder="••••••" onkeyup="if(event.key==='Enter') doLogin()">
            <button class="login-btn" onclick="doLogin()">確認進入</button>
            <p id="login-err" style="color: #f87171; font-size: 12px; margin-top: 15px; display: none;">❌ 代碼錯誤，請重新輸入</p>
        </div>
    </div>

    <!-- 側邊欄 -->
    <aside class="sidebar" id="sidebar">
        <div class="logo-area">
            <div class="logo-icon">P</div>
            <div style="line-height: 1.2;">
                <div style="font-weight: 700; font-size: 16px;">佩璽保險自動化</div>
                <div style="font-size: 10px; color: #94a3b8;">Flagship System V19</div>
            </div>
        </div>
        
        <nav class="nav-list" id="nav-list">
            <!-- 由 JS 動態生成 -->
        </nav>

        <div style="padding: 20px; font-size: 10px; color: #475569; text-align: center;">
            © 2026 吳佩璽保險經紀人
        </div>
    </aside>

    <!-- 主畫面 -->
    <main class="main-content">
        <div class="mobile-header">
            <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:24px;">☰</button>
            <span>佩璽保險自動化</span>
            <div style="width:24px;"></div>
        </div>
        <iframe id="content-frame" src="pdfFiller.html" allow="file-system-access"></iframe>
    </main>

    <script>
        const MASTER_PWD = 'E223105238'; 
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwxB5RLsey3ZRNXmqOTqzmf8XelwDvIu6b57oNhzdQJMQE-Di5jcQLN8ZGao3YuK4bY/exec';
        
        const menuItems = [
            { id: 'filler', name: '📄 PDF 填寫助手', url: 'pdfFiller.html' },
            { id: 'responses', name: '📊 客戶填寫紀錄', url: `${GAS_URL}?page=crm` },
            { id: 'decrypt', name: '🔐 批量解密工作站', url: 'pdfDecrypt.html' },
            { id: 'merge', name: '📂 批量合併系統', url: 'pdfMerge.html' },
            { id: 'renewal', name: '🏠 自動續保代打', url: 'renewalAssistant.html' },
        ];

        function checkAuth() {
            if (sessionStorage.getItem('isAuthed') === 'true') {
                document.getElementById('login-overlay').style.display = 'none';
            }
        }

        function doLogin() {
            if (document.getElementById('login-pwd').value === MASTER_PWD) {
                sessionStorage.setItem('isAuthed', 'true');
                document.getElementById('login-overlay').style.opacity = '0';
                setTimeout(() => { document.getElementById('login-overlay').style.display = 'none'; }, 500);
            } else {
                document.getElementById('login-err').style.display = 'block';
                document.getElementById('login-pwd').value = '';
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        window.onload = () => {
            checkAuth();
            const nav = document.getElementById('nav-list');
            menuItems.forEach((item, idx) => {
                const a = document.createElement('div');
                a.className = `nav-item ${idx === 0 ? 'active' : ''}`;
                a.innerHTML = `<span>${item.name}</span>`;
                a.onclick = () => {
                    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                    a.classList.add('active');
                    document.getElementById('content-frame').src = item.url;
                    if(window.innerWidth <= 768) toggleSidebar();
                };
                nav.appendChild(a);
            });
        };

        // 🚀 核心：監聽跨頁連動指令
        window.addEventListener('message', function(event) {
            if (event.data.action === 'setClientName') {
                // 1. 切換到第一個工具 (id: filler)
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                document.querySelector('.nav-item').classList.add('active');
                document.getElementById('content-frame').src = 'pdfFiller.html';
                
                // 2. 注入名字
                setTimeout(() => {
                    const iframe = document.getElementById('content-frame');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage({ action: 'fillName', name: event.data.name }, '*');
                    }
                }, 800);
            }
        });
    </script>
</body>
</html>
