<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>佩璽保險自動化系統 | 旗艦平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 260px;
            --primary-color: #2DB7F5; /* 換成問卷的亮藍色 */
            --sidebar-bg: #1e293b;
            --text-light: #f8fafc;
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background: #f1f5f9;
            overflow: hidden;
        }

        /* 登入鎖定層 */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(10px); z-index: 9999; display: flex; justify-content: center; align-items: center; color: white; transition: 0.5s; }
        .login-box { background: #1e293b; padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .login-box h2 { margin: 0 0 10px 0; color: #38bdf8; letter-spacing: 2px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; text-align: center; font-size: 18px; outline: none; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary-color); color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .login-box button:hover { background: #1d4ed8; transform: scale(1.02); }
        .login-error { color: #f87171; font-size: 12px; margin-top: 10px; display: none; }

        /* 側邊欄 */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            background: #0f172a;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--primary-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-group {
            padding: 20px 0;
            flex: 1;
            overflow-y: auto;
        }

        .nav-label {
            padding: 0 20px 10px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
        }

        .nav-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            text-decoration: none;
            transition: 0.2s;
            cursor: pointer;
            font-size: 14px;
        }

        .nav-item:hover {
            background: #334155;
            color: white;
        }

        .nav-item.active {
            background: var(--primary-color);
            color: white;
            border-left: 4px solid #38bdf8;
        }

        /* 主內容區 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* 手機版適配 */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -100%;
                z-index: 100;
                height: 100%;
            }
            .sidebar.open {
                left: 0;
            }
            .mobile-header {
                display: flex;
                background: var(--sidebar-bg);
                color: white;
                padding: 10px 20px;
                align-items: center;
                justify-content: space-between;
            }
        }

        .mobile-header { display: none; }
    </style>
</head>
<body>

    <!-- 登入鎖定層 -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>🔒 系統鎖定</h2>
            <p style="color: #94a3b8; font-size: 13px; margin-bottom: 20px;">請輸入授權密碼以使用產險自動化系統</p>
            <input type="password" id="login-pwd" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter') doLogin()">
            <button onclick="doLogin()">登入系統</button>
            <div id="login-err" class="login-error">密碼錯誤，請重新輸入</div>
        </div>
    </div>

    <!-- 側邊選單 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon">💎</div>
            <div style="font-weight: bold; font-size: 18px;">佩璽保險自動化</div>
        </div>
        
        <div class="nav-group" id="nav-list">
            <div class="nav-label">核心業務</div>
            <!-- 選單項目會由 JS 生成 -->
        </div>

        <div style="padding: 20px; font-size: 10px; color: #475569; text-align: center;">
            © 2026 吳佩璽保險經紀人
        </div>
    </aside>

    <!-- 主畫面 -->
    <main class="main-content">
        <div class="mobile-header">
            <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:24px;">☰</button>
            <span>佩璽保險自動化</span>
            <div style="width:24px;"></div>
        </div>
        <iframe id="content-frame" name="content-frame" src="pdfFiller.html" allow="file-system-access"></iframe>
    </main>

    <script>
        const MASTER_PWD = 'E223105238'; 
        
        const menuItems = [
            { id: 'filler', name: '📄 PDF 填寫助手', url: 'pdfFiller.html' },
            { id: 'responses', name: '📊 客戶填寫紀錄', url: 'responses.html' },
            { id: 'decrypt', name: '🔐 批量解密工作站', url: 'pdfDecrypt.html' },
            { id: 'merge', name: '📂 批量合併系統', url: 'pdfMerge.html' },
            { id: 'renewal', name: '🏠 自動續保代打', url: 'renewalAssistant.html' },
        ];

        function checkAuth() {
            if (sessionStorage.getItem('isAuthed') === 'true') {
                document.getElementById('login-overlay').style.display = 'none';
            }
        }

        function doLogin() {
            const pwd = document.getElementById('login-pwd').value;
            if (pwd === MASTER_PWD) {
                sessionStorage.setItem('isAuthed', 'true');
                document.getElementById('login-overlay').style.opacity = '0';
                setTimeout(() => { document.getElementById('login-overlay').style.display = 'none'; }, 500);
            } else {
                document.getElementById('login-err').style.display = 'block';
                document.getElementById('login-pwd').value = '';
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        window.onload = () => {
            checkAuth();
            const nav = document.getElementById('nav-list');
            menuItems.forEach((item, idx) => {
                const a = document.createElement('div');
                a.className = `nav-item ${idx === 0 ? 'active' : ''}`;
                a.innerHTML = `<span>${item.name}</span>`;
                a.onclick = () => {
                    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                    a.classList.add('active');
                    document.getElementById('content-frame').src = item.url;
                    if(window.innerWidth <= 768) toggleSidebar();
                };
                nav.appendChild(a);
            });
        };
    </script>
</body>
</html>
