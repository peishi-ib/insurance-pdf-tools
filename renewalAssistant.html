<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保險續保通知產生器 Pro - Peixi Wu</title>
    <style>
        :root { --primary: #4a7c59; --bg: #f8f9fa; --accent: #e9ecef; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 20px; color: #333; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        .section { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .radio-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .radio-btn { flex: 1; text-align: center; padding: 10px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; background: #eee; transition: 0.3s; }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .radio-btn { background: var(--primary); color: white; border-color: var(--primary); }
        .preview-area { background: #f0f7f2; border: 1px dashed var(--primary); padding: 15px; border-radius: 8px; margin-top: 20px; white-space: pre-wrap; min-height: 100px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        .history { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .delete-btn { color: #ff4d4d; cursor: pointer; font-weight: bold; padding: 5px; }
        .copy-hint { font-size: 14px; color: var(--primary); text-align: center; margin-top: 10px; font-weight: bold; display: none; }
        .bank-memory { font-size: 12px; color: #666; margin-top: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 續保通知產生器</h2>
    
    <div class="section">
        <label>1. 選擇繳費方式</label>
        <div class="radio-group">
            <label><input type="radio" name="payType" value="credit" checked onchange="toggleFields()"> <span class="radio-btn">信用卡</span></label>
            <label><input type="radio" name="payType" value="bank" onchange="toggleFields()"> <span class="radio-btn">銀行扣款</span></label>
            <label><input type="radio" name="payType" value="self" onchange="toggleFields()"> <span class="radio-btn">自行繳費</span></label>
        </div>
    </div>

    <div class="section">
        <label>被保險人姓名</label>
        <input type="text" id="insuredName" placeholder="例如：王小明" oninput="updatePreview()">
    </div>

    <div class="section">
        <label>保單週年日 (月/日)</label>
        <input type="text" id="anniversaryDate" placeholder="例如：1/22" oninput="updatePreview()">
    </div>

    <div class="section">
        <label>扣款/繳費月份</label>
        <select id="payMonth" onchange="updatePreview()">
            <option value="這個月">這個月</option>
            <option value="下個月" selected>下個月</option>
        </select>
    </div>

    <div id="dynamicFields">
        <div class="section">
            <label>繳費人姓名</label>
            <input type="text" id="payerName" placeholder="例如：妳" oninput="updatePreview()">
        </div>

        <div class="section">
            <label id="bankLabel">扣款銀行與明細</label>
            <input type="text" id="bankDetail" list="bankHistory" placeholder="輸入或選擇銀行（如：台新銀行 信用卡）" oninput="updatePreview()">
            <datalist id="bankHistory">
                </datalist>
            <div class="bank-memory">💡 系統會自動記住您輸入過的銀行名稱</div>
        </div>
    </div>

    <div class="preview-area" id="previewText">內容預覽將顯示在此...</div>
    <div id="copyHint" class="copy-hint">✅ 已複製到剪貼簿並記錄！</div>
    
    <button onclick="copyAndSave()">複製文字並記錄名單</button>

    <div class="history">
        <h3>✅ 已通知名單</h3>
        <div id="historyList"></div>
        <button onclick="clearHistory()" style="background: #999; font-size: 14px; margin-top: 20px;">清空所有紀錄</button>
    </div>
</div>

<script>
    // 初始化銀行記憶
    let bankList = JSON.parse(localStorage.getItem('bankList') || '[]');

    function toggleFields() {
        const type = document.querySelector('input[name="payType"]:checked').value;
        const dynamicFields = document.getElementById('dynamicFields');
        
        // 防呆：自行繳費隱藏銀行與繳費人欄位
        if (type === 'self') {
            dynamicFields.classList.add('hidden');
        } else {
            dynamicFields.classList.remove('hidden');
            // 根據類型切換 Label 提示
            document.getElementById('bankLabel').innerText = (type === 'credit') ? '扣款銀行與信用卡' : '扣款銀行與帳戶';
        }
        updatePreview();
    }

    function updatePreview() {
        const type = document.querySelector('input[name="payType"]:checked').value;
        const name = document.getElementById('insuredName').value || 'OOO';
        const date = document.getElementById('anniversaryDate').value || 'O/O';
        const month = document.getElementById('payMonth').value;
        const payer = document.getElementById('payerName').value || '妳';
        const bank = document.getElementById('bankDetail').value || 'OO銀行 OOO';

        let content = `🔔 溫馨提醒\n${name} 的保單週年日是 ${date}\n`;
        
        if (type === 'credit') {
            content += `${month}會從${payer}的**《${bank}》**自動扣款\n\n⚠️ 如有以下狀況，請儘速與我聯繫：\n💳 信用卡 更換、遺失或到期\n📍 通訊地址 變更`;
        } else if (type === 'bank') {
            content += `${month}會從${payer}的**《${bank}》**自動扣款，請記得預留足夠餘額\n\n⚠️ 如有以下狀況，請儘速與我聯繫：\n🏦 變更扣款帳戶\n📍 通訊地址 變更`;
        } else {
            content += `${month}保險公司會寄發繳費單，請務必記得在期限內完成繳費喔！\n\n⚠️ 如有以下狀況，請儘速與我聯繫：\n📍 通訊地址 變更（萬一保單一直沒扣到錢，停效前會寄紙本通知，請一定要正確才收得到通知）`;
        }

        content += `\n\n以免扣款失敗影響權益唷！謝謝！🛡️`;
        document.getElementById('previewText').innerText = content;
        return content;
    }

    function copyAndSave() {
        const text = updatePreview();
        const name = document.getElementById('insuredName').value;
        const bank = document.getElementById('bankDetail').value;
        const type = document.querySelector('input[name="payType"]:checked').value;
        
        if (!name) {
            alert('請至少輸入被保險人姓名再記錄喔！');
            return;
        }

        // 1. 記錄銀行名稱 (若非自行繳費且有輸入內容)
        if (type !== 'self' && bank.trim() !== '') {
            saveBank(bank.trim());
        }

        // 2. 複製到剪貼簿
        navigator.clipboard.writeText(text).then(() => {
            document.getElementById('copyHint').style.display = 'block';
            setTimeout(() => { document.getElementById('copyHint').style.display = 'none'; }, 2000);
            
            // 3. 存入紀錄
            saveToHistory(name);
        });
    }

    function saveBank(bankName) {
        if (!bankList.includes(bankName)) {
            bankList.push(bankName);
            localStorage.setItem('bankList', JSON.stringify(bankList));
            renderBankList();
        }
    }

    function renderBankList() {
        const datalist = document.getElementById('bankHistory');
        datalist.innerHTML = bankList.map(bank => `<option value="${bank}">`).join('');
    }

    function saveToHistory(name) {
        let history = JSON.parse(localStorage.getItem('notifyHistory') || '[]');
        const now = new Date();
        const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
        
        history.unshift({ name: name, time: timeStr });
        if (history.length > 50) history.pop(); 
        
        localStorage.setItem('notifyHistory', JSON.stringify(history));
        renderHistory();
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('notifyHistory') || '[]');
        const listHtml = history.map((item, index) => `
            <div class="history-item">
                <span><strong>${item.name}</strong> (${item.time})</span>
                <span class="delete-btn" onclick="deleteItem(${index})">✕</span>
            </div>
        `).join('');
        document.getElementById('historyList').innerHTML = listHtml || '<p style="color:#999; text-align:center;">尚無紀錄</p>';
    }

    function deleteItem(index) {
        let history = JSON.parse(localStorage.getItem('notifyHistory') || '[]');
        history.splice(index, 1);
        localStorage.setItem('notifyHistory', JSON.stringify(history));
        renderHistory();
    }

    function clearHistory() {
        if (confirm('確定要清空所有通知紀錄嗎？')) {
            localStorage.removeItem('notifyHistory');
            renderHistory();
        }
    }

    // 啟動初始化
    renderBankList();
    renderHistory();
    toggleFields();
</script>

</body>
</html>
