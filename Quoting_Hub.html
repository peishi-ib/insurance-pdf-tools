<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2DB7F5;
      --secondary: #8BC220;
      --bg: #f5f7f9;
      --accent: #FF5252;
      --text: #2c3e50;
      --border: #e1e8ed;
      --card-bg: #ffffff;
      --shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    * { box-sizing: border-box; font-family: 'Noto Sans TC', sans-serif; }
    body { background: var(--bg); color: var(--text); margin: 0; padding: 0; min-height: 100vh; }
    
    /* 🎨 Header */
    header { background: #fff; border-bottom: 1px solid var(--border); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
    header h1 { font-size: 20px; font-weight: 900; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
    .header-actions { display: flex; gap: 15px; }

    /* 🏎️ Topbar: Client Info (SmartBeb style) */
    .top-client-bar { background: #fff; padding: 20px 40px; display: flex; gap: 30px; align-items: flex-end; border-bottom: 2px solid #edf2f7; }
    .client-field { flex: 1; }
    .client-field label { display: block; font-size: 13px; color: #7f8c8d; font-weight: 700; margin-bottom: 8px; }
    .btn-group { display: flex; background: #f1f3f5; border-radius: 12px; padding: 4px; }
    .btn-toggle { flex: 1; border: none; background: transparent; padding: 10px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; color: #95a5a6; }
    .btn-toggle.active { background: #fff; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    
    select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; background: #fff; font-weight: 500; }
    select:focus, input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(45, 183, 245, 0.1); }

    /* 🧱 Main Layout */
    .main-grid { display: grid; grid-template-columns: 280px 1fr; gap: 20px; padding: 20px 40px; }
    .sidebar { display: flex; flex-direction: column; gap: 20px; }
    .panel { background: #fff; border-radius: 20px; padding: 20px; box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.02); }
    .panel-title { font-weight: 900; font-size: 16px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; border-left: 5px solid var(--primary); padding-left: 10px; }

    /* 🏃 Recent History */
    .history-list { display: flex; flex-direction: column; gap: 10px; }
    .history-item { padding: 12px; border-radius: 12px; border: 1px solid #f1f3f5; cursor: pointer; transition: 0.2s; font-size: 14px; }
    .history-item:hover { background: #f8fafc; border-color: var(--primary); }
    .history-item b { color: var(--primary); display: block; }
    .history-item span { font-size: 11px; color: #aaa; }

    /* 組合分析器 Builder Area */
    .builder-area { display: flex; flex-direction: column; gap: 25px; }
    .hot-sets { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
    .set-card { padding: 20px; border-radius: 20px; border: 2px dashed #ddd; text-align: center; cursor: pointer; transition: 0.3s; }
    .set-card:hover { border-color: var(--secondary); background: #fafff0; }
    .set-card h3 { margin: 0 0 5px 0; font-size: 16px; }
    .set-card p { font-size: 12px; color: #999; margin: 0; }

    /* 📑 Policy Cards */
    .policy-card { background: #fff; border-radius: 20px; box-shadow: var(--shadow); border: 1px solid #edf2f7; overflow: hidden; margin-bottom: 20px; }
    .policy-header { background: #fcfdfe; padding: 15px 25px; border-bottom: 1px solid #edf2f7; display: flex; justify-content: space-between; align-items: center; }
    .company-tag { background: var(--primary); color: #fff; padding: 4px 12px; border-radius: 30px; font-size: 12px; font-weight: 800; }
    
    .item-list { width: 100%; border-collapse: collapse; }
    .item-list th { text-align: left; padding: 15px 25px; font-size: 13px; color: #aaa; border-bottom: 1px solid #f1f3f5; }
    .item-list td { padding: 15px 25px; vertical-align: middle; border-bottom: 1px solid #f8fafc; }
    
    .badge-type { font-size: 11px; padding: 2px 6px; border-radius: 4px; color: #fff; margin-right: 8px; font-weight: bold; }
    .badge-main { background: #e67e22; }
    .badge-rider { background: #3498db; }

    .btn { border: none; border-radius: 12px; padding: 10px 20px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: var(--secondary); color: #fff; }
    .btn-outline { background: #fff; border: 1px solid var(--border); color: #95a5a6; }
    .btn-outline:hover { background: #f8fbff; border-color: var(--primary); color: var(--primary); }
    .btn-add { background: #f1f3f5; color: #7f8c8d; width: 100%; justify-content: center; margin: 10px 0; border: 2px dashed #ddd; }
    .btn-add:hover { background: #e0f2fe; color: var(--primary); border-color: var(--primary); }

    /* 📊 Bottom Summary */
    .summary-footer { background: #2c3e50; color: #fff; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; position: fixed; bottom: 0; width: 100%; z-index: 1000; }
    .total-price { font-size: 28px; font-weight: 900; color: var(--secondary); }

    /* 🌀 Loader */
    .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; flex-direction: column; gap: 15px; }
    .spinner { width: 50px; height: 50px; border: 5px solid #eee; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loader">
    <div class="spinner"></div>
    <div style="font-weight:600; color:var(--primary);">皇室同步中...</div>
  </div>

  <header>
    <h1>👑 皇家保險組合器</h1>
    <div class="header-actions">
      <button class="btn btn-outline" onclick="window.close()">取消離開</button>
      <button class="btn btn-primary" id="btnReport" onclick="generateReport()" style="background:#8BC220; display:none;">📊 顯示報告書</button>
      <button class="btn btn-secondary" onclick="saveToSheet()">🚀 同步同步試算表</button>
    </div>
  </header>

  <!-- 🏎️ Top Client Information Bar -->
  <div class="top-client-bar">
    <div class="client-field" style="max-width: 150px;">
      <label>類別</label>
      <div class="btn-group">
        <button class="btn-toggle active" id="type_child" onclick="changeType('child')">👶 小孩</button>
        <button class="btn-toggle" id="type_adult" onclick="changeType('adult')">🤴 大人</button>
      </div>
    </div>
    <div class="client-field" style="max-width: 250px;">
      <label>被保險人姓名</label>
      <input type="text" id="custName" placeholder="請輸入姓名" onchange="clientManualChange()">
    </div>
    <div class="client-field" style="max-width: 120px;">
      <label>性別</label>
      <div class="btn-group">
        <button class="btn-toggle active" id="sex_m" onclick="changeSex('男')">男</button>
        <button class="btn-toggle" id="sex_f" onclick="changeSex('女')">女</button>
      </div>
    </div>
    <div class="client-field">
      <label>出生日期 (保險年齡: <span id="dispAgeString">0</span> 歲)</label>
      <input type="date" id="custBirth" onchange="calcFullAge()">
    </div>
    <div class="client-field" style="max-width: 150px;">
      <label>工作職級</label>
      <select id="custJob" onchange="clientManualChange()">
        <option value="1">職等 1 (一般)</option>
        <option value="2">職等 2</option>
        <option value="3">職等 3 (外勤)</option>
        <option value="4">職等 4</option>
        <option value="5">職等 5 (危險)</option>
        <option value="6">職等 6</option>
      </select>
    </div>
  </div>

  <div class="main-grid">
    <!-- 🏃 Sidebar: History -->
    <div class="sidebar">
      <div class="panel">
        <div class="panel-title">🏃 最近填表紀錄</div>
        <div class="history-list" id="historyList">
           <div style="text-align:center; color:#ccc; padding:20px;">載入中...</div>
        </div>
      </div>
    </div>

    <!-- 🏗️ Quoting Builder Area -->
    <div class="builder-area">
      
      <!-- 1. 套用套裝 -->
      <div>
        <div class="panel-title">⭐ 套用熱門組合</div>
        <div class="hot-sets" id="hotSetContainer">
          <!-- Sets dynamically loaded -->
        </div>
      </div>

      <!-- 2. 商品清單 -->
      <div>
        <div class="panel-title">🩹 規劃明細</div>
        <div id="policyGroups">
          <!-- Policy folders grouped by Company -->
          <div style="text-align:center; color:#ccc; padding:50px; background:#fff; border-radius:20px; border:2px dashed #eee;">
            點擊下方「＋ 新增保單」開始規劃
          </div>
        </div>
        
        <button class="btn btn-add" onclick="showCompanySelector()">＋ 新增保單</button>
      </div>

    </div>
  </div>

  <div style="height: 100px;"></div>

  <div class="summary-footer">
    <div>
      <span style="opacity: 0.7; font-size: 14px;">規劃項目：</span>
      <b id="footerCount">0</b> 項
    </div>
    <div style="text-align: right;">
      <span style="font-size: 14px; opacity: 0.8; margin-right: 10px;">預估首年總保費：</span>
      <span class="total-price" id="footerTotal">$ 0</span>
    </div>
  </div>

  <!-- 模態框：選擇公司 -->
  <div id="modalCompany" class="loading-overlay" style="background:rgba(0,0,0,0.5)">
    <div class="panel" style="width:400px; max-height:80vh; overflow-y:auto;">
      <div class="panel-title">🏥 選擇保險公司</div>
      <div id="companyList" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
      <button class="btn btn-outline" style="width:100%; margin-top:20px;" onclick="closeModal('modalCompany')">關閉</button>
    </div>
  </div>

  <!-- 模態框：選擇商品 -->
  <div id="modalProduct" class="loading-overlay" style="background:rgba(0,0,0,0.5)">
    <div class="panel" style="width:500px; max-height:80vh; overflow-y:auto;">
      <div id="productModalTitle" class="panel-title">📦 選擇商品</div>
      <input type="text" placeholder="輸入關鍵字搜尋..." id="prodSearchInput" style="margin-bottom:15px;" oninput="filterModalProducts()">
      <div id="productList" style="display:flex; flex-direction:column; gap:8px;"></div>
      <button class="btn btn-outline" style="width:100%; margin-top:20px;" onclick="closeModal('modalProduct')">返回</button>
    </div>
  </div>

  <script>
    // 🛡️ 鋼鐵初始化：保證所有必備屬性都存在
    let master = { 
      type: 'adult', 
      clients: { top5: [], dropdown: [] }, 
      sets: [], 
      companies: ["全球人壽", "台灣人壽", "遠雄人壽"], 
      _error: null 
    };

    try {
      // 伺服器端注入
      const serverData = <?= JSON.stringify(initialContext) ?>;
      if (serverData && typeof serverData === 'object') {
        // 深度合併資料，確保不漏掉必備欄位
        if (serverData.type) master.type = serverData.type;
        if (serverData.clients) master.clients = serverData.clients;
        if (serverData.sets) master.sets = serverData.sets;
        if (serverData.companies && serverData.companies.length > 0) master.companies = serverData.companies;
        if (serverData._error) master._error = serverData._error;
      }
    } catch(e) {
      console.error("初始化資料失敗:", e);
    }
    
    let client = { name: '', gender: '男', birthday: '', age: 0, occ: 1 };
    let quote = []; 

    window.onload = function() {
      try {
        const params = new URLSearchParams(window.location.search);
        const urlType = params.get('type');
        if (urlType) master.type = urlType;
        
        document.getElementById('type_child').classList.toggle('active', master.type === 'child');
        document.getElementById('type_adult').classList.toggle('active', master.type === 'adult');

        if (master._error) {
          document.getElementById('historyList').innerHTML = `<div style="padding:10px; color:#ff5252; font-size:12px; background:#fff0f0; border-radius:10px;">⚠️ 初始化錯誤：${master._error}</div>`;
        } else {
          renderHistory(master.clients ? master.clients.top5 : []);
          renderSets(master.sets || []);
        }
      } catch (e) {
        console.error("啟動失敗:", e);
      } finally {
        showLoading(false);
      }
    };

    function loadCompaniesDirectly() {
       // 公司清單也已經在 master.companies 裡了
    }

    function showLoading(show) {
      document.getElementById('loader').style.display = show ? 'flex' : 'none';
    }

    function refreshAll() {
      showLoading(true);
      setTimeout(() => showLoading(false), 20000);

      google.script.run
        .withSuccessHandler(ctx => {
          master.clients = ctx.clients;
          master.sets = ctx.sets || [];
          master.companies = ctx.companies || [];
          renderHistory(ctx.clients.top5);
          renderSets(ctx.sets || []);
          showLoading(false);
        })
        .withFailureHandler(err => {
          showLoading(false);
          // 診斷訊息：讓用戶知道具體哪裡壞了
          document.getElementById('historyList').innerHTML = `
            <div style="padding:15px; background:#fff3f3; border-radius:12px; border: 1px solid #ffb3b3;">
              <div style="font-weight:700; color:#e74c3c; margin-bottom:5px;">⚠️ 後端連線失敗</div>
              <div style="font-size:12px; color:#666; word-break:break-all;">${err}</div>
            </div>`;
        })
        .getQuotingContext(master.type);
    }

    // --- Client Logic ---
    function changeType(t) {
      master.type = t;
      document.getElementById('type_child').classList.toggle('active', t === 'child');
      document.getElementById('type_adult').classList.toggle('active', t === 'adult');
      refreshAll();
    }

    function changeSex(s) {
      client.gender = s;
      document.getElementById('sex_m').classList.toggle('active', s === '男');
      document.getElementById('sex_f').classList.toggle('active', s === '女');
      recalculateAll();
    }


    function calcFullAge() {
      const birth = document.getElementById('custBirth').value;
      if (!birth) return;
      client.birthday = birth;
      const bDate = new Date(birth);
      const now = new Date();
      let age = now.getFullYear() - bDate.getFullYear();
      let m = now.getMonth() - bDate.getMonth();
      if (now.getDate() < bDate.getDate()) m--;
      let totalMonths = age * 12 + m;
      let insuranceAge = Math.floor(totalMonths / 12);
      if (totalMonths % 12 >= 6) insuranceAge++;
      
      client.age = insuranceAge;
      document.getElementById('dispAgeString').innerText = insuranceAge;
      recalculateAll();
    }

    function clientManualChange() {
      client.name = document.getElementById('custName').value;
      client.occ = parseInt(document.getElementById('custJob').value);
      recalculateAll();
    }

    // --- History & Sets ---
    function renderHistory(top5) {
      const hList = document.getElementById('historyList');
      if (!top5 || top5.length === 0) {
        hList.innerHTML = '<div style="text-align:center; color:#ccc; padding:20px;">暫無填表數據</div>';
        return;
      }
      hList.innerHTML = top5.map((c, i) => `
        <div class="history-item" onclick="selectClient('${c.name}')">
          <b>${c.name}</b>
          <span>${c.dateStr}</span>
        </div>
      `).join('');
    }

    function selectClient(name) {
      showLoading(true);
      google.script.run
        .withSuccessHandler(details => {
          document.getElementById('custName').value = details.name;
          document.getElementById('custBirth').value = details.birthday ? new Date(details.birthday).toISOString().split('T')[0] : '';
          document.getElementById('custJob').value = details.occ;
          changeSex(details.gender);
          calcFullAge();
          showLoading(false);
        })
        .getClientActuarialDetails(master.type, name);
    }

    function renderSets(sets) {
      const container = document.getElementById('hotSetContainer');
      container.innerHTML = sets.map(s => `
        <div class="set-card" onclick="applySet('${s.name}')">
          <h3>🥇 ${s.name}</h3>
          <p>全方位防護組合</p>
        </div>
      `).join('');
    }

    function applySet(name) {
       const set = master.sets.find(s => s.name === name);
       if (!set) return;
       showLoading(true);
       
       google.script.run
         .withSuccessHandler(results => {
            // Group results by company
            const groups = {};
            results.forEach(r => {
              if (!groups[r.company]) groups[r.company] = [];
              groups[r.company].push(r);
            });
            quote = Object.keys(groups).map(c => ({ company: c, items: groups[c] }));
            renderQuote();
            showLoading(false);
         })
         .calculateQuote(client, set.items);
    }

    // --- Builder Logic ---
    function showCompanySelector() {
      const list = document.getElementById('companyList');
      list.innerHTML = master.companies.map(c => `<button class="btn btn-outline" onclick="selectCompany('${c}')">${c}</button>`).join('');
      document.getElementById('modalCompany').style.display = 'flex';
    }

    let tempComp = '';
    let tempType = '主約';
    function selectCompany(comp) {
      tempComp = comp;
      closeModal('modalCompany');
      showProductSelector('主約');
    }

    function showProductSelector(type) {
      tempType = type;
      showLoading(true);
      document.getElementById('productModalTitle').innerText = `📦 選擇 ${tempComp} - ${type}`;
      google.script.run
        .withSuccessHandler(prods => {
          showLoading(false);
          master.rawProducts = prods;
          renderProductList(prods);
          document.getElementById('modalProduct').style.display = 'flex';
          document.getElementById('prodSearchInput').value = '';
        })
        .getProductsByFilter(tempComp, type);
    }

    function renderProductList(prods) {
      const container = document.getElementById('productList');
      container.innerHTML = prods.map(p => `
        <div class="history-item" onclick="addItem('${p.name}')">
          <div style="font-weight:700;">${p.name}</div>
          <div style="font-size:11px; color:#666;">${p.category}</div>
        </div>
      `).join('');
    }

    function filterModalProducts() {
      const q = document.getElementById('prodSearchInput').value.toLowerCase();
      const filtered = master.rawProducts.filter(p => p.name.includes(q));
      renderProductList(filtered);
    }

    function addItem(name) {
      const p = master.rawProducts.find(p => p.name === name);
      let group = quote.find(g => g.company === tempComp);
      if (!group) {
        group = { company: tempComp, items: [] };
        quote.push(group);
      }
      group.items.push({
        name: p.name,
        type: p.type,
        company: tempComp,
        category: p.category,
        term: '1年期',
        plan: '計畫1',
        premium: 0,
        summary: ''
      });
      closeModal('modalProduct');
      renderQuote();
      recalculateAll();
    }

    function renderQuote() {
      const area = document.getElementById('policyGroups');
      if (quote.length === 0) {
        area.innerHTML = '<div style="text-align:center; color:#ccc; padding:50px; background:#fff; border-radius:20px; border:2px dashed #eee;">點擊下方「＋ 新增保單」開始規劃</div>';
        updateTotal();
        return;
      }

      area.innerHTML = quote.map((g, gi) => `
        <div class="policy-card">
          <div class="policy-header">
            <span class="company-tag">${g.company}</span>
            <button class="btn" style="color:var(--accent); font-size:12px; padding:0" onclick="removeGroup(${gi})">刪除整單 🗑️</button>
          </div>
          <table class="item-list">
            <thead>
              <tr><th width="45%">保障內容</th><th width="15%">年期</th><th width="20%">計畫/保額</th><th width="12%">保費</th><th width="8%"></th></tr>
            </thead>
            <tbody>
              ${g.items.map((it, ii) => `
                <tr>
                  <td>
                    <span class="badge-type ${it.type === '主約' ? 'badge-main' : 'badge-rider'}">${it.type === '主' ? '主' : '附'}</span>
                    <b style="font-size:14px;">${it.name}</b>
                    <div style="font-size:11px; color:#95a5a6; margin-top:4px;">${it.summary || '計算中...'}</div>
                  </td>
                  <td>
                    <select style="padding:6px; font-size:12px; border:1px solid #ddd; border-radius:6px;" onchange="updateItem(${gi},${ii},'term',this.value)">
                      ${["1年期", "10年期", "20年期", "30年期", "至85歲"].map(t => `<option value="${t}" ${t === it.term ? 'selected' : ''}>${t}</option>`).join('')}
                    </select>
                  </td>
                  <td>
                    <select style="padding:6px; font-size:12px; border:1px solid #ddd; border-radius:6px;" onchange="updateItem(${gi},${ii},'plan',this.value)">
                      ${["10萬", "20萬", "50萬", "100萬", "計畫一", "計畫二", "3A", "5A", "NI-05", "NI-10"].map(p => `<option value="${p}" ${p === it.plan ? 'selected' : ''}>${p}</option>`).join('')}
                    </select>
                  </td>
                  <td style="font-weight:900; color:var(--accent);">$ ${Number(it.premium).toLocaleString()}</td>
                  <td><button style="border:none; background:none; cursor:pointer;" onclick="removeItem(${gi},${ii})">🗑️</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          <div style="padding:10px 25px;">
            <button class="btn btn-add" style="margin:0; font-size:12px; padding:8px" onclick="tempComp='${g.company}'; showProductSelector('附約')">＋ 新增附約</button>
          </div>
        </div>
      `).join('');
      updateTotal();
    }

    function removeItem(gi, ii) {
      quote[gi].items.splice(ii, 1);
      if (quote[gi].items.length === 0) quote.splice(gi, 1);
      renderQuote();
      recalculateAll();
    }

    function removeGroup(gi) {
      quote.splice(gi, 1);
      renderQuote();
      recalculateAll();
    }

    function updateItem(gi, ii, key, val) {
      quote[gi].items[ii][key] = val;
      recalculateAll();
    }

    function recalculateAll() {
      if (!quote.length) return;
      const flatItems = [];
      quote.forEach(g => g.items.forEach(it => flatItems.push(it)));
      
      google.script.run
        .withSuccessHandler(results => {
          let cursor = 0;
          quote.forEach(g => {
            g.items.forEach((it, i) => {
              g.items[i] = results[cursor++];
            });
          });
          renderQuote();
        })
        .calculateQuote(client, flatItems);
    }

    function updateTotal() {
      let total = 0;
      let count = 0;
      quote.forEach(g => {
        g.items.forEach(it => {
          total += (Number(it.premium) || 0);
          count++;
        });
      });
      document.getElementById('footerTotal').innerText = `$ ${total.toLocaleString()}`;
      document.getElementById('footerCount').innerText = count;
    }

    function saveToSheet() {
      if (!client.name) { alert('請填寫客戶姓名！'); return; }
      const flatItems = [];
      quote.forEach(g => g.items.forEach(it => flatItems.push(it)));
      if (!flatItems.length) { alert('尚未加入商品！'); return; }

      showLoading(true);
      google.script.run
        .withSuccessHandler(msg => {
          showLoading(false);
          alert(msg);
          document.getElementById('btnReport').style.display = 'inline-flex';
        })
        .saveQuoteToSpreadsheet(master.type, client.name, flatItems, client);
    }

    function generateReport() {
      const baseUrl = window.location.href.split('?')[0];
      const url = `${baseUrl}?page=main&type=${master.type}&id=${encodeURIComponent(client.name)}`;
      window.open(url, '_blank');
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
  </script>
</body>
</html>
